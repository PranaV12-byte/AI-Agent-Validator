# alembic.ini — Alembic migration configuration for Safebot

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Prepend sys.path so that `app` package is importable from migrations
prepend_sys_path = .

# SQLAlchemy URL — overridden in env.py via settings
# Do NOT put real credentials here; use .env
sqlalchemy.url = postgresql+asyncpg://safebot:safebot_dev@localhost:5432/safebot

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
